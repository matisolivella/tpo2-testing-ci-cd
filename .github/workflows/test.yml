name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt

      - run: python -m pytest --html=report.html